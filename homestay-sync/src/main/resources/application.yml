server:
  port: 8081

spring:
  application:
    name: homestay-sync
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://localhost:5432/homestay?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: postgres
    password: postgres
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8

data:
  redis:
    host: localhost
    port: 6379
    database: 1

homestay:
  core:
    base-url: http://localhost:8080/api

sync:
  inventory:
    cron: "0 0 */2 * * ?"
  order:
    cron: "0 */5 * * * ?"
  price:
    cron: "0 0 */1 * * ?"

logging:
  level:
    com.homestay.sync: DEBUG
